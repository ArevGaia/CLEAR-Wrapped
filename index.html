<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEAR Wrapped</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="icon" type="image/x-icon" href="images/marcus.png">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src = "script.js"></script>
    
</head>
<body>
    <div class="interface-main">
        <h1>Welcome to CLEAR Wrapped!!!</h1>
        <h3>Up to date as of 04/12/2026</h3>
        <div class="search-box">
            <input type="text" id="mentor-search-input" placeholder="Mia Jones">
            <select name="semester" id="semester">
                <option value="s26">Spring 2026</option>
                <option value="f25">Fall 2025</option>
            </select>
            <button type="button" class = "buttons" id="search-button">Enter</button>
        </div>
    </div>

    <div id="mentor-info">
        <h2 id="mentor-name"></h2>
        <h2 id="ohq"></h2>
        <h2 id="sessions"></h2>
        <h2 id="helped"></h2>
        <h2 id="average"></h2>
        <h2 id="most"></h2>
        <h2 id="size"></h2>
        <h2 id="gratitude"></h2>
    </div>
    






</body>
</html>
