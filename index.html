<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEAR Wrapped</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="interface-main">
        <h1>Welcome to CLEAR Wrapped!!!</h1>
        <h3>Up to date as of 12/18/2025</h3>
        <div class="search-box">
            <input type="text" id="mentor-search-input" placeholder="Enter your name"> <button type="button" class = "buttons" id="search-button">Enter</button>
        </div>
    </div>

    <div id="mentor-info">
        <h2 id="mentor-name"></h2>
        <h2 id="ohq"></h2>
        <h2 id="sessions"></h2>
        <h2 id="helped"></h2>
        <h2 id="average"></h2>
        <h2 id="most"></h2>
        <h2 id="size"></h2>
        <h2 id="gratitude"></h2>
    </div>
    

 <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
        <script>
            // Reuse the `wait` function from 4.2
        function wait(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }
 
        function findMentor(){
            var $mentorName = $("#mentor-search-input").val();
            // Example: Fetch local CSV (place data.csv in the same folder as your HTML/JS file)
            fetchCsvAndConvert('dashboard.csv').then(data => {
                //console.log(data);
                processData(data);
            });
                   
        }
        function processData(results){
            var $mentorName = $("#mentor-search-input").val();
            console.log($mentorName);
            var dataAsArray = results.split("\n");
            var datas = [];
            // document.getElementById('mentor-name').innerText = results;
            var found = false;
            for (let i = 0; i < dataAsArray.length; i++){
                var row = dataAsArray[i].split(",");
                // console.log(row);
                if (row[2] == $mentorName || row[3] == $mentorName){
                    found = true;
                    var course_name = row[0];
                    var ohq = row[4];
                    var sessions = row[13];
                    var course_size = Number(row[5]);     
                    var helped = Number(row[6]);
                    var avg = Number(row[8]);
                    var average_helped = Math.round((helped/course_size)*100, 2);
                    var most = Number(row[10]);
                    datas = [course_name, ohq, sessions, helped, average_helped, most, avg];
                }
                }
            if (!(found)){
                $("#mentor-name").text("That's not a mentor from Fall 2025");s
            }
            else{
                $("#mentor-name").text("Hello " + $mentorName + "!");
                displayData(datas);
            }
        
    }

        async function displayData(datas){
            await wait(2000);
            $("#ohq").text("You've had quite a semester as a "+ datas[1]+ " for " + datas[0]);
            await wait(2000);
            $("#sessions").text("Over the course of " + datas[2] + " sessions")
            await wait(2000);
            $("#helped").text("you helped "+ datas[3]+ " students this semester,")
            await wait(2000);
            $("#average").text("that's "+ datas[4]+ " percent of the class!")
            await wait(2000);
            $("#most").text("At your busiest session, you helped a whopping "+ datas[5]+ " students! That's quite a lot!");
            await wait(2000);
            $("#size").text("Most weeks, you helped "+ datas[6]+ " students, wow!");
            await wait(2000);
            $("#gratitude").text("Just know, that we here at CLEAR HQ are really proud of you and super grateful! Keep up the hard work!!!");

        }

        async function fetchCsvAndConvert(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const csvContent = await response.text();
                //console.log(csvContent);
                return csvContent;
            } catch (error) {
                console.error('Error fetching CSV:', error);
            }
            }

        document.querySelector('#mentor-search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                findMentor();
            }
        });
        
        document.querySelector('#search-button').addEventListener('click', function (e) {
            findMentor();
        })

        </script>



</body>
</html>
